task_prompt: 'Create a pulse animation button component with:

  1. CSS @keyframes using only transform and opacity (GPU-composited)

  2. prefers-reduced-motion media query fallback (static button)

  3. JavaScript play/pause/stop controls

  4. Validation that both animated and fallback buttons render correctly'
