# Code Reviewer — Reviews code for quality, security, and correctness issues
id: code-reviewer
name: Code Reviewer
version: 1.0.0
description: Reviews code for quality, security, and correctness issues
threshold: 85
max_iterations: 5
model:
  provider: anthropic
  model: claude-sonnet-4-20250514
  max_tokens: 512
  temperature: 0.2
evaluation:
  self_eval_weight: 0.3
  judge_eval_weight: 0.7
  benchmark_cases: []
