# Tool definitions for Hund AI
tools:
  - name: search_knowledge_base
    description: "Sok i styde.ai:s dokumentation, planer och agent-status"
    parameters:
      query: string
      scope: "docs | agents | all"

  - name: get_agent_status
    description: "Hamta status och KPI for en specifik agent"
    parameters:
      agent_id: string

  - name: list_active_agents
    description: "Lista alla aktiva agenter och deras aktuella status"
    parameters: {}

  - name: file_read
    description: "Las en fil fran workspacen"
    parameters:
      path: string
